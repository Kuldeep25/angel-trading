<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0">
    <i class="bi bi-code-square me-2 text-accent"></i>
    {{ isNew ? 'New Strategy' : 'Edit: ' + name }}
  </h4>
  <button class="btn btn-accent" (click)="save()" [disabled]="saving">
    <i class="bi bi-floppy me-1"></i>
    {{ saving ? 'Saving…' : 'Save Strategy' }}
  </button>
</div>

@if (saveMsg) {
  <div class="alert alert-success py-2">{{ saveMsg }}</div>
}
@if (saveError) {
  <div class="alert alert-danger py-2">{{ saveError }}</div>
}

<div class="row g-3 mb-3">
  <div class="col-12 col-md-4">
    <label class="form-label small">Strategy Name *</label>
    <input class="form-control" [(ngModel)]="name" [disabled]="!isNew" placeholder="e.g. my_ema_strategy">
  </div>
  <div class="col-6 col-md-2">
    <label class="form-label small">Category</label>
    <select class="form-select" [(ngModel)]="category">
      @for (c of categories; track c) {
        <option [value]="c">{{ c }}</option>
      }
    </select>
  </div>
  <div class="col-12 col-md-6">
    <label class="form-label small">Description</label>
    <input class="form-control" [(ngModel)]="description" placeholder="Short description…">
  </div>
</div>

<div class="card">
  <div class="card-header d-flex align-items-center gap-2 py-2">
    <i class="bi bi-filetype-py text-warning"></i>
    <span class="small">strategy.py</span>
    <span class="badge bg-secondary ms-auto">Python 3</span>
  </div>
  <div id="monaco-container" style="height: 520px; width: 100%;"></div>
</div>
